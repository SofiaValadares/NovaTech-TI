<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>NovaTech TI</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/pages/trocarsenha.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
  <div id="header-container"></div>

  <main class="trocarsenha">
    <section class="title">
      <h1>TROCAR SENHA</h1>
    </section>

    <section class="campos">
      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Digite seu email">
      </div>

      <div class="input-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Digite sua senha">
      </div>

      <div class="input-group">
        <input type="password-confirm" id="senha-confirmar" placeholder="Confirme sua senha">
      </div>

      <div class="buttons-grup">
        <button id="btn-password">Trocar Senha</button>
        <button class="limpar" id="btn-limpar">Limpar</button>
      </div>
    </section>
  </main>

  <div id="footer-container"></div>

  <script src="/js/main.js"></script>
</body>
</html>
