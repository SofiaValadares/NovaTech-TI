<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>NovaTech TI</title>
    <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components/header.css">
  <link rel="stylesheet" href="css/components/footer.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/pages/login.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div id="header-container"></div>

    <main class="login">
        <section class="title">
            <h1>LOGIN DE CLIENTES</h1>
        </section>

        <section class="campos">
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Digite seu email">
            </div>

            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Digite sua senha">
            </div>

            <div class="buttons-grup">
                <button id="btn-login">Realizar Login</button>
                <button class="limpar" id="btn-limpar">Limpar</button>
            </div>

            <div id="login-message" class="login-message" role="alert" aria-live="polite"></div>
        </section>

        <section class="links">
            <nav>
                <a href="trocarsenha.html">
                    <span class="material-icons">arrow_forward</span>
                    Recuperar senha
                </a>

                <a href="cadastro.html">
                    <span class="material-icons">arrow_forward</span>
                    Relizar cadastro
                </a>
            </nav>
        </section>
    </main>


    <div id="footer-container"></div>

    <script src="js/auth.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script src="js/pages/login.js"></script>
</body>
</html>
