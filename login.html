<!DOCTYPE html>
<!-- ============================================================================
     PÁGINA: LOGIN
     ============================================================================
     Página pública - acessível sem autenticação
     Autenticar usuário no sistema
     ============================================================================ -->
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>NovaTech TI</title>
    <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components/header.css">
  <link rel="stylesheet" href="css/components/footer.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/pages/login.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div id="header-container"></div>

    <main class="login">
        <section class="title">
            <h1>LOGIN DE CLIENTES</h1>
        </section>

        <section class="campos" role="form" aria-label="Formulário de login">
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Digite seu email" aria-required="true" aria-describedby="email-help">
                <small id="email-help" style="display:none;">Digite um email válido (ex: usuario@exemplo.com)</small>
            </div>

            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Digite sua senha" aria-required="true">
            </div>

            <div class="buttons-grup">
                <button id="btn-login" aria-label="Botão para realizar login">Realizar Login</button>
                <button class="limpar" id="btn-limpar" aria-label="Botão para limpar os campos do formulário">Limpar</button>
            </div>

            <div id="login-message" class="login-message" role="alert" aria-live="polite" aria-label="Mensagens do sistema"></div>
        </section>

        <section class="links">
            <nav aria-label="Links de suporte">
                <a href="trocarsenha.html" aria-label="Ir para página de recuperação de senha">
                    <span class="material-icons" aria-hidden="true">arrow_forward</span>
                    Recuperar senha
                </a>

                <a href="cadastro.html" aria-label="Ir para página de cadastro">
                    <span class="material-icons" aria-hidden="true">arrow_forward</span>
                    Realizar cadastro
                </a>
            </nav>
        </section>
    </main>


    <div id="footer-container"></div>

    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script src="js/pages/login.js"></script>
</body>
</html>
