<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>NovaTech TI</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/pages/cadastro.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div id="header-container"></div>

    <main class="cadastro">
        <section class="title">
            <h1>CADASTRO DE CLIENTES</h1>
        </section>

        <section class="campos">
            <div class="input-group">
                <label for="nome">Nome</label>
                <input type="name" id="nome" placeholder="Digite seu nome">
            </div>

            <div class="input-group">
                <label for="cpf">CPF</label>
                <input type="cpf" id="cpf" placeholder="Digite seu CPF">
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Digite seu email">
            </div>

            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Digite sua senha">
            </div>

            <div class="input-group">
                <input type="password-confirm" id="senha-confirmar" placeholder="Confirme sua senha">
            </div>

            <div class="buttons-grup">
                <button id="btn-cadastrar">Cadastrar</button>
                <button id="btn-voltar">Voltar</button>
                <button class="limpar" id="btn-limpar">Limpar</button>
            </div>
        </section>
    </main>

    <div id="footer-container"></div>

    <script src="/js/main.js"></script>
</body>
</html>
