<!DOCTYPE html>
<!-- ============================================================================
     PÁGINA: TROCAR SENHA
     ============================================================================
     Página pública - acessível sem autenticação
     Alterar senha de usuário existente
     ============================================================================ -->
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>NovaTech TI</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components/header.css">
  <link rel="stylesheet" href="css/components/footer.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/pages/trocarsenha.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
  <div id="header-container"></div>

  <main class="trocarsenha">
    <section class="title">
      <h1>TROCAR SENHA</h1>
    </section>

    <section class="campos">
      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Digite seu email">
      </div>

      <div class="input-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Digite sua senha">
      </div>

      <div class="input-group">
        <input type="password" id="senha-confirmar" placeholder="Confirme sua senha">
      </div>

      <div class="input-group">
        <output id="senha-instrucoes">
          Regras para senha:
          <br>
          - Deve ter pelo menos 6 caracteres.
          <br>
          - Deve conter ao menos 1 número, 1 letra maiúscula e 1 caractere especial permitido:
          <br>
          <strong>@ # $ % &amp; * ! ? / \ | - _ + . =</strong>
          <br>
          - Não são permitidos os seguintes caracteres:
          <br>
          <strong>¨ { } [ ] ´ ` ~ ^ : ; &lt; &gt; , “ ‘</strong>
        </output>
      </div>

      <div class="buttons-grup">
        <button id="btn-password">Trocar Senha</button>
        <button class="limpar" id="btn-limpar">Limpar</button>
      </div>

      <div id="trocarsenha-message" class="trocarsenha-message" role="alert" aria-live="polite"></div>
    </section>
  </main>

  <div id="footer-container"></div>

  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
  <script src="js/pages/trocarsenha.js"></script>
</body>
</html>
